<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boisar Tourism Assistant</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
        }

        /* ── TOGGLE BUTTON ── */
        .chatbot-toggle {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 58px;
            height: 58px;
            background: linear-gradient(135deg, #2d5a27, #4a7c59);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 1.4rem;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(45, 90, 39, 0.4);
            transition: all 0.3s ease;
            z-index: 10001;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chatbot-toggle:hover {
            transform: scale(1.08);
            box-shadow: 0 10px 28px rgba(45, 90, 39, 0.5);
        }

        .chatbot-toggle.active {
            background: linear-gradient(135deg, #c0392b, #e74c3c);
            box-shadow: 0 6px 20px rgba(192, 57, 43, 0.4);
        }

        .chatbot-toggle .badge {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 18px;
            height: 18px;
            background: #e74c3c;
            border-radius: 50%;
            border: 2px solid white;
            font-size: 0.65rem;
            font-weight: 700;
            display: none;
            align-items: center;
            justify-content: center;
        }

        /* ── CHATBOT WINDOW ── */
        .chatbot-container {
            position: fixed;
            bottom: 96px;
            right: 24px;
            width: 370px;
            height: 540px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.16), 0 0 0 1px rgba(45, 90, 39, 0.08);
            flex-direction: column;
            z-index: 10000;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.3s ease;

            /* Hidden by default */
            display: none;
            opacity: 0;
            transform: translateY(16px) scale(0.97);
        }

        .chatbot-container.open {
            display: flex;
        }

        .chatbot-container.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* ── HEADER ── */
        .chatbot-header {
            background: linear-gradient(135deg, #2d5a27, #4a7c59);
            color: white;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .chatbot-header::before {
            content: '';
            position: absolute;
            top: -20px;
            right: -20px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.07);
            pointer-events: none;
        }

        .chatbot-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bot-avatar-header {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.18);
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            flex-shrink: 0;
        }

        .chatbot-title-text h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 700;
            margin: 0;
            line-height: 1.2;
        }

        .chatbot-title-text span {
            font-size: 0.72rem;
            opacity: 0.8;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .online-dot {
            width: 6px;
            height: 6px;
            background: #69e069;
            border-radius: 50%;
            display: inline-block;
        }

        .chatbot-header-actions {
            display: flex;
            gap: 4px;
        }

        .header-btn {
            background: rgba(255, 255, 255, 0.12);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            transition: background 0.2s;
        }

        .header-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* ── MESSAGES AREA ── */
        .chatbot-messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f8faf8;
            scroll-behavior: smooth;
        }

        .chatbot-messages::-webkit-scrollbar {
            width: 4px;
        }

        .chatbot-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chatbot-messages::-webkit-scrollbar-thumb {
            background: #d0ddd0;
            border-radius: 4px;
        }

        /* ── WELCOME BANNER ── */
        .welcome-message {
            background: white;
            border: 1px solid #e8f0e6;
            border-radius: 14px;
            padding: 16px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(45, 90, 39, 0.06);
        }

        .welcome-message h4 {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            color: #1a3320;
            margin-bottom: 6px;
        }

        .welcome-message p {
            font-size: 0.82rem;
            color: #888;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .quick-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
        }

        .quick-chip {
            background: #e8f5e8;
            color: #2d5a27;
            border: 1px solid #c8dfc8;
            border-radius: 99px;
            padding: 5px 11px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
            user-select: none;
        }

        .quick-chip:hover {
            background: #2d5a27;
            color: white;
            border-color: #2d5a27;
        }

        /* ── MESSAGE BUBBLES ── */
        .message {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            animation: msgIn 0.3s ease both;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            flex-shrink: 0;
            margin-bottom: 2px;
        }

        .message.bot .message-avatar {
            background: #e8f5e8;
            color: #2d5a27;
            border: 1px solid #c8dfc8;
        }

        .message.user .message-avatar {
            background: #2d5a27;
            color: white;
        }

        .message-bubble-wrap {
            display: flex;
            flex-direction: column;
            max-width: 78%;
        }

        .message.user .message-bubble-wrap {
            align-items: flex-end;
        }

        .message-content {
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 0.875rem;
            line-height: 1.5;
        }

        .message.bot .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            border: 1px solid #eee;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #2d5a27, #4a7c59);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(45, 90, 39, 0.25);
        }

        .message-time {
            font-size: 0.68rem;
            color: #bbb;
            margin-top: 4px;
            padding: 0 2px;
        }

        /* ── TYPING INDICATOR ── */
        .typing-wrap {
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        .typing-bubbles {
            background: white;
            border: 1px solid #eee;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            padding: 12px 16px;
            display: flex;
            gap: 4px;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            background: #4a7c59;
            border-radius: 50%;
            animation: bounce 1.3s infinite ease;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.18s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.36s;
        }

        @keyframes bounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
            }

            30% {
                transform: translateY(-7px);
            }
        }

        /* ── INPUT BAR ── */
        .chatbot-input {
            padding: 12px 14px;
            border-top: 1px solid #eef2ee;
            display: flex;
            gap: 8px;
            align-items: center;
            background: white;
            flex-shrink: 0;
        }

        .chatbot-input input {
            flex: 1;
            border: 1.5px solid #e0e8e0;
            border-radius: 99px;
            padding: 9px 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.875rem;
            outline: none;
            background: #f8faf8;
            color: #333;
            transition: all 0.2s;
        }

        .chatbot-input input::placeholder {
            color: #bbb;
        }

        .chatbot-input input:focus {
            border-color: #4a7c59;
            background: white;
            box-shadow: 0 0 0 3px rgba(45, 90, 39, 0.08);
        }

        .chatbot-send {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, #2d5a27, #4a7c59);
            color: white;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.85rem;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .chatbot-send:hover {
            transform: scale(1.08);
            box-shadow: 0 4px 12px rgba(45, 90, 39, 0.3);
        }

        .chatbot-send:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ── MOBILE ── */
        @media (max-width: 480px) {
            .chatbot-container {
                width: 100%;
                height: 100%;
                bottom: 0;
                right: 0;
                border-radius: 0;
            }

            .chatbot-toggle {
                bottom: 16px;
                right: 16px;
            }
        }
    </style>
    <link rel="stylesheet" href="theme.css">`n</head>

<body>

    <!-- Toggle Button -->
    <button class="chatbot-toggle" id="chatbotToggle" title="Chat with us">
        <i class="fas fa-comments"></i>
        <span class="badge" id="chatBadge"></span>
    </button>

    <!-- Chatbot Window -->
    <div class="chatbot-container" id="chatbotContainer">

        <!-- Header -->
        <div class="chatbot-header">
            <div class="chatbot-title">
                <div class="bot-avatar-header"><i class="fas fa-robot"></i></div>
                <div class="chatbot-title-text">
                    <h3>Boisar Tourism Assistant</h3>
                    <span><span class="online-dot"></span> Online &mdash; usually replies instantly</span>
                </div>
            </div>
            <div class="chatbot-header-actions">
                <button class="header-btn" id="chatbotClear" title="Clear chat"><i
                        class="fas fa-trash-alt"></i></button>
                <button class="header-btn" id="chatbotClose" title="Close"><i class="fas fa-times"></i></button>
            </div>
        </div>

        <!-- Messages -->
        <div class="chatbot-messages" id="chatbotMessages">
            <div class="welcome-message">
                <h4>Welcome to Boisar Tourism! 🌊</h4>
                <p>I'm your virtual guide. Ask me anything about destinations, culture, accommodation, or trip planning.
                </p>
                <div class="quick-chips">
                    <span class="quick-chip" data-query="Best places to visit">📍 Best places</span>
                    <span class="quick-chip" data-query="Eco tourism destinations">🌿 Eco tourism</span>
                    <span class="quick-chip" data-query="Cultural experiences">🎭 Culture</span>
                    <span class="quick-chip" data-query="Best time to visit">📅 When to visit</span>
                    <span class="quick-chip" data-query="Accommodation options">🏨 Stay</span>
                    <span class="quick-chip" data-query="Transportation">🚗 Transport</span>
                </div>
            </div>
        </div>

        <!-- Input -->
        <div class="chatbot-input">
            <input type="text" id="chatbotInput" placeholder="Ask me anything about Boisar tourism…" maxlength="500"
                autocomplete="off">
            <button class="chatbot-send" id="chatbotSend" title="Send">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>

    </div>

    <script src="chatbot.js"></script>
    <script src="js/hamburger-menu.js"></script>
</body>

</html>
