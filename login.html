<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Boisar Tourism</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Original purple gradient */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px 20px;
        }

        /* ── CARD ── */
        .auth-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.18);
            width: 100%;
            max-width: 440px;
            overflow: hidden;
            animation: cardIn 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(24px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ── HEADER — original green gradient ── */
        .auth-header {
            background: linear-gradient(135deg, #2d5a27, #4a7c59);
            color: white;
            padding: 36px 40px 32px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .auth-header::before {
            content: '';
            position: absolute;
            top: -40px;
            right: -40px;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
        }

        .auth-header::after {
            content: '';
            position: absolute;
            bottom: -30px;
            left: -30px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
        }

        .auth-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.9rem;
            font-weight: 700;
            margin: 0 0 6px;
            position: relative;
        }

        .auth-header h1 i {
            margin-right: 10px;
            font-size: 1.5rem;
        }

        .auth-header p {
            margin: 0;
            opacity: 0.85;
            font-size: 0.9rem;
            font-weight: 300;
            position: relative;
        }

        /* ── FORM BODY ── */
        .auth-form {
            padding: 36px 40px 40px;
        }

        /* Messages */
        .error-message,
        .success-message {
            padding: 13px 16px;
            border-radius: 10px;
            font-size: 0.875rem;
            margin-bottom: 22px;
            display: none;
            align-items: center;
            gap: 9px;
        }

        .error-message {
            background: #fdf2f2;
            color: #e74c3c;
            border-left: 3px solid #e74c3c;
        }

        .success-message {
            background: #f0f9f0;
            color: #27ae60;
            border-left: 3px solid #27ae60;
        }

        /* ── FIELDS ── */
        .field {
            margin-bottom: 20px;
        }

        .field label {
            display: block;
            font-size: 0.82rem;
            font-weight: 500;
            color: #333;
            margin-bottom: 7px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap .field-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            font-size: 0.875rem;
            pointer-events: none;
            transition: color 0.2s;
        }

        .input-wrap:focus-within .field-icon {
            color: #2d5a27;
        }

        .input-wrap input {
            width: 100%;
            padding: 13px 14px 13px 40px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            color: #333;
            background: #f8f9fa;
            transition: all 0.25s ease;
            outline: none;
        }

        .input-wrap input::placeholder {
            color: #bbb;
        }

        .input-wrap input:focus {
            border-color: #2d5a27;
            background: white;
            box-shadow: 0 0 0 3px rgba(45, 90, 39, 0.1);
        }

        .input-wrap input.error {
            border-color: #e74c3c;
            background: #fdf2f2;
        }

        .input-wrap input.success {
            border-color: #27ae60;
            background: #f0f9f0;
        }

        .password-toggle {
            position: absolute;
            right: 13px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .password-toggle:hover {
            color: #2d5a27;
        }

        /* ── OPTIONS ROW ── */
        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            font-size: 0.875rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #555;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 15px;
            height: 15px;
            accent-color: #2d5a27;
            cursor: pointer;
        }

        .forgot-password {
            color: #2d5a27;
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        /* ── BUTTON — original green gradient ── */
        .auth-button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #2d5a27, #4a7c59);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            transition: all 0.3s ease;
        }

        .auth-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(45, 90, 39, 0.3);
        }

        .auth-button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .loading-spinner {
            display: none;
            width: 17px;
            height: 17px;
            border: 2px solid rgba(255, 255, 255, 0.35);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }



        /* ── DEMO SECTION ── */
        .demo-section {
            border-top: 1px dashed #e0e0e0;
            padding-top: 14px;
            margin-top: 20px;
            margin-bottom: 22px;
        }

        .demo-label {
            text-align: center;
            font-size: 0.78rem;
            color: #aaa;
            margin-bottom: 10px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .demo-row {
            display: flex;
            gap: 10px;
        }

        .social-button {
            flex: 1;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.82rem;
            font-weight: 500;
            color: #333;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.25s ease;
        }

        .social-button:hover {
            border-color: #2d5a27;
            color: #2d5a27;
            background: #f0f9f0;
        }

        /* ── FOOTER ── */

        .auth-footer {
            text-align: center;
            font-size: 0.875rem;
            color: #666;
        }

        .auth-footer a {
            color: #2d5a27;
            font-weight: 500;
            text-decoration: none;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 480px) {
            body {
                padding: 16px;
            }

            .auth-form {
                padding: 28px 24px 32px;
            }

            .auth-header {
                padding: 28px 24px;
            }
        }
    </style>
    <link rel="stylesheet" href="theme.css">`n</head>

<body>

    <div class="auth-card">

        <!-- HEADER -->
        <div class="auth-header">
            <h1><i class="fas fa-mountain"></i>Boisar Tourism</h1>
            <p>Welcome back! Please sign in to your account</p>
        </div>

        <!-- FORM -->
        <div class="auth-form">

            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>
            <div class="success-message" id="successMessage">
                <i class="fas fa-check-circle"></i>
                <span id="successText"></span>
            </div>

            <form id="loginForm">

                <div class="field">
                    <label for="email">Email Address</label>
                    <div class="input-wrap">
                        <i class="fas fa-envelope field-icon"></i>
                        <input type="email" id="email" name="email" placeholder="you@example.com" required>
                    </div>
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock field-icon"></i>
                        <input type="password" id="password" name="password" placeholder="Your password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('password')">
                            <i class="fas fa-eye" id="eye-password"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe" name="rememberMe">
                        Remember me
                    </label>
                    <a href="forgot-password.html" class="forgot-password">Forgot Password?</a>
                </div>

                <button type="submit" class="auth-button" id="loginButton">
                    <div class="loading-spinner" id="loginSpinner"></div>
                    <span id="loginText">Sign In</span>
                </button>

            </form>

            <!-- Demo logins for testing -->
            <div class="demo-section">
                <div class="demo-label">Demo Login — Testing Only</div>
                <div class="demo-row">
                    <button class="social-button" onclick="socialLogin('google')">
                        <i class="fab fa-google"></i> Demo Google
                    </button>
                    <button class="social-button" onclick="socialLogin('facebook')">
                        <i class="fab fa-facebook-f"></i> Demo Facebook
                    </button>
                </div>
            </div>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Sign up here</a>
            </div>
        </div>
    </div>

    <script>
        function togglePassword(id) {
            const input = document.getElementById(id);
            const icon = document.getElementById('eye-' + id);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function showError(msg) {
            document.getElementById('errorText').textContent = msg;
            document.getElementById('errorMessage').style.display = 'flex';
            document.getElementById('successMessage').style.display = 'none';
        }
        function showSuccess(msg) {
            document.getElementById('successText').textContent = msg;
            document.getElementById('successMessage').style.display = 'flex';
            document.getElementById('errorMessage').style.display = 'none';
        }
        function hideMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }
        function setLoading(on) {
            document.getElementById('loginButton').disabled = on;
            document.getElementById('loginSpinner').style.display = on ? 'block' : 'none';
            document.getElementById('loginText').textContent = on ? 'Signing In…' : 'Sign In';
        }

        function validateForm() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            document.querySelectorAll('.input-wrap input').forEach(i => i.classList.remove('error', 'success'));

            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                document.getElementById('email').classList.add('error');
                showError('Please enter a valid email address.');
                return false;
            }
            document.getElementById('email').classList.add('success');

            if (!password || password.length < 6) {
                document.getElementById('password').classList.add('error');
                showError('Password must be at least 6 characters.');
                return false;
            }
            document.getElementById('password').classList.add('success');
            return true;
        }

        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            if (!validateForm()) return;
            hideMessages();
            setLoading(true);
            try {
                const fd = new FormData(this);
                const API_BASE = window.API_BASE || '';
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: fd.get('email'), password: fd.get('password') })
                });
                const result = await response.json();
                if (result.success) {
                    localStorage.setItem('authToken', result.data.token);
                    localStorage.setItem('userData', JSON.stringify(result.data.user));
                    if (fd.get('rememberMe') === 'on') localStorage.setItem('rememberMe', 'true');
                    showSuccess('Login successful! Redirecting…');
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
                } else {
                    showError(result.message || 'Login failed. Please try again.');
                }
            } catch {
                showError('Login failed. Please try again.');
            } finally {
                setLoading(false);
            }
        });

        function socialLogin(provider) {
            const data = {
                id: `demo_${provider}_${Date.now()}`,
                name: provider === 'google' ? 'Demo Google User' : 'Demo Facebook User',
                email: `demo.${provider}@example.com`,
                provider,
                createdAt: new Date().toISOString()
            };
            localStorage.setItem('authToken', `demo_${provider}_token_${Date.now()}`);
            localStorage.setItem('userData', JSON.stringify(data));
            showSuccess(`Demo ${provider.charAt(0).toUpperCase() + provider.slice(1)} login successful! Redirecting…`);
            setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
        }

        window.addEventListener('load', function () {
            if (localStorage.getItem('authToken')) window.location.href = 'dashboard.html';
            document.getElementById('email').focus();
        });
    </script>
</body>

</html>
